name: AI Agent TEST

on:
  pull_request:
    types: [opened]

jobs:
  analyze_pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama serve &
          sleep 10
      - name: Get PR Changes
        id: changes
        run: |
          # Fetch files from PR using GitHub API
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
            | jq -r '.[] | .patch' > changes.diff
          
          # Show diff
          echo "=== DIFF CONTENT ==="
          cat changes.diff
          echo "=== END DIFF ==="
          echo "Diff size: $(wc -c < changes.diff) bytes"
      - name: Pull neural-chat Model
        run: |
          ollama pull neural-chat
      - name: Analyze with Model
        run: |
          python3 << 'EOF'
          import subprocess
          import json
          
          try:
              with open('changes.diff', 'r') as f:
                  diff_content = f.read()
              
              print(f"Diff lido: {len(diff_content)} bytes")
              
              prompt = f"""Você é um analista de código especializado em revisão de Pull Requests.

          IMPORTANTE: Analise APENAS o diff fornecido abaixo. Não invente informações ou arquivos que não aparecem no diff.

          DIFF DO PR:
          {diff_content}

          Responda SEMPRE com:
          1. Resumo do que foi mudado
          2. Arquivos afetados (BASEADO APENAS no diff)
          3. Possíveis impactos

          Seja conciso e direto na análise.
          """
              
              print("Chamando modelo")
              
              curl_cmd = [
                  'curl', '-X', 'POST',
                  'http://localhost:11434/api/generate',
                  '-H', 'Content-Type: application/json',
                  '-d', json.dumps({
                      'model': 'neural-chat',
                      'prompt': prompt,
                      'stream': False
                  })
              ]
              
              result = subprocess.run(curl_cmd, capture_output=True, text=True)
              
              print(f"Response code: {result.returncode}")
              print(f"Response stdout: {result.stdout[:500]}")
              print(f"Response stderr: {result.stderr[:500]}")
              
              response = json.loads(result.stdout)
              analysis_text = response.get('response', 'Sem resposta do modelo')
              
              print(f"Analysis received: {len(analysis_text)} chars")
              
              with open('analysis-result.md', 'w') as f:
                  f.write('# PR Code Analysis\n\n')
                  f.write(analysis_text)
              
              print("File saved successfully!")
              
          except Exception as e:
              print(f"ERROR: {str(e)}")
              import traceback
              traceback.print_exc()
              
              with open('analysis-result.md', 'w') as f:
                  f.write('# Analysis Error\n\n')
                  f.write(f'Error: {str(e)}\n')
              
              exit(1)
          EOF
      - name: Debug - Check if file exists
        run: |
          echo "Verificando arquivos..."
          ls -la analysis-result.md
          pwd
          ls -la
      - name: Commit Analysis Results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add AI analysis results"
          file_pattern: "analysis-result.md"
          commit_user_name: "GitHub Action"
          commit_user_email: "action@github.com"
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysisText = fs.readFileSync('analysis-result.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## AI Analysis Complete\n\n${analysisText}`
            });

