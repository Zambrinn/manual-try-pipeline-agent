name: AI Agent TEST

on:
  pull_request:
    types: [opened]

jobs:
  analyze_pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama serve &
          sleep 10
      - name: Get PR Changes
        id: changes
        run: |
          git fetch origin
          git diff origin/${{ github.base_ref }}..HEAD > changes.diff
          cat changes.diff
      - name: Pull neural-chat Model
        run: |
          ollama pull neural-chat
      - name: Analyze with Ollama
        run: |
          python3 << 'EOF'
          import subprocess
          import json
          
          try:
              with open('changes.diff', 'r') as f:
                  diff_content = f.read()
              
              print(f"Diff lido: {len(diff_content)} bytes")
              
              prompt = f"""Você é um analista de código especializado em revisão de Pull Requests.

          IMPORTANTE: Analise APENAS o diff fornecido abaixo. Não invente informações ou arquivos que não aparecem no diff.

          Se o diff estiver vazio ou muito pequeno, responda: "Diff muito pequeno ou vazio para análise significativa."

          DIFF DO PR:
          {diff_content}

          Se houver conteúdo, responda com:
          1. Resumo do que foi mudado
          2. Arquivos afetados (BASEADO APENAS no diff)
          3. Possíveis impactos
          """
              
              print("Chamando modelo")
              
              curl_cmd = [
                  'curl', '-X', 'POST',
                  'http://localhost:11434/api/generate',
                  '-H', 'Content-Type: application/json',
                  '-d', json.dumps({
                      'model': 'neural-chat',
                      'prompt': prompt,
                      'stream': False
                  })
              ]
              
              result = subprocess.run(curl_cmd, capture_output=True, text=True)
              
              print(f"Response code: {result.returncode}")
              print(f"Response stdout: {result.stdout[:500]}")
              print(f"Response stderr: {result.stderr[:500]}")
              
              response = json.loads(result.stdout)
              analysis_text = response.get('response', 'Sem resposta do modelo')
              
              print(f"Analysis received: {len(analysis_text)} chars")
              
              with open('analysis-result.md', 'w') as f:
                  f.write('# PR Code Analysis\n\n')
                  f.write(analysis_text)
              
              print("File saved successfully!")
              
          except Exception as e:
              print(f"ERROR: {str(e)}")
              import traceback
              traceback.print_exc()
              
              with open('analysis-result.md', 'w') as f:
                  f.write('# Analysis Error\n\n')
                  f.write(f'Error: {str(e)}\n')
              
              exit(1)
          EOF
                            
                        except Exception as e:
                            print(f"ERROR: {str(e)}")
                            import traceback
                            traceback.print_exc()
                            
                            # Cria arquivo de erro
                            with open('analysis-result.md', 'w') as f:
                                f.write('# Analysis Error\n\n')
                                f.write(f'Error: {str(e)}\n')
                            
                            exit(1)
                        EOF
      - name: Commit Analysis Results
        run: |
          # Verifica se o arquivo foi criado
          if [ ! -f analysis-result.md ]; then
            echo "analysis-result.md não foi criado"
            echo "Criando arquivo padrão..."
            echo "# Analysis Failed" > analysis-result.md
            echo "A análise não conseguiu ser processada." >> analysis-result.md
          fi
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add analysis-result.md
          git commit -m "Update PR analysis results"
          git pull --rebase origin ${{ github.head_ref }}
          git push origin HEAD:${{ github.head_ref }}
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysisText = fs.readFileSync('analysis-result.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## AI Analysis Complete\n\n${analysisText}`
            });

